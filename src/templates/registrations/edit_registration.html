<!DOCTYPE html>
<html>

<head>
    <title>Edit Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h1>Edit Registration</h1>

    <form method="POST">

        <div class="mb-3">

            <label>Attendee</label>

            <select name="attendee_id"
                    class="form-control"
                    required>

                {% for attendee in attendees %}

                <option value="{{ attendee.attendee_id }}"

                    {% if attendee.attendee_id == registration.attendee_id %}
                        selected
                    {% endif %}

                >
                    {{ attendee.fullname }}
                </option>

                {% endfor %}

            </select>

        </div>

        <div class="mb-3">

            <label>Event</label>

            <select name="event_id"
                    class="form-control"
                    required>

                {% for event in events %}

                <option value="{{ event.event_id }}"

                    {% if event.event_id == registration.event_id %}
                        selected
                    {% endif %}

                >
                    {{ event.event_name }}
                </option>

                {% endfor %}

            </select>

        </div>

        <div class="mb-3">

            <label>Attendance Status</label>

            <select name="attendance_status"
                    class="form-control">

                <option value="Present"
                    {% if registration.attendance_status == 'Present' %}
                        selected
                    {% endif %}
                >
                    Present
                </option>

                <option value="Absent"
                    {% if registration.attendance_status == 'Absent' %}
                        selected
                    {% endif %}
                >
                    Absent
                </option>

                <option value="Late"
                    {% if registration.attendance_status == 'Late' %}
                        selected
                    {% endif %}
                >
                    Late
                </option>

            </select>

        </div>

        <button type="submit"
                class="btn btn-success">
            Update Registration
        </button>

        <a href="/registrations"
           class="btn btn-secondary">
            Back
        </a>

    </form>

</body>
</html>
