<!DOCTYPE html>
<html>

<head>
    <title>Events</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h1 class="mb-4">Events List</h1>

    <!-- TOP CONTROLS (ADD + SEARCH) -->
    <div class="d-flex justify-content-between align-items-center mb-3">

    <!-- LEFT SIDE -->
    <div class="d-flex gap-2">

        <a href="/" class="btn btn-secondary">
            ← Dashboard
        </a>

        <a href="/add_event" class="btn btn-primary">
            Add Event
        </a>

    </div>

    <!-- RIGHT SIDE (SEARCH) -->
    <form method="GET" action="/events" class="d-flex gap-2">

        <input
            type="text"
            name="search"
            class="form-control form-control-sm"
            placeholder="Search event..."
            style="width: 250px;"
        >

        <button type="submit" class="btn btn-primary btn-sm">
            Search
        </button>

    </form>

</div>

    <!-- TABLE -->
    <table class="table table-bordered table-striped">

        <tr>
            <th>ID</th>
            <th>Event Name</th>
            <th>Date</th>
            <th>Location</th>
            <th>Actions</th>
        </tr>

        {% for event in events %}
        <tr>
            <td>{{ event.event_id }}</td>
            <td>{{ event.event_name }}</td>
            <td>{{ event.event_date }}</td>
            <td>{{ event.location }}</td>

            <td>
                <a href="/edit_event/{{ event.event_id }}" class="btn btn-warning btn-sm">
                    Edit
                </a>

                <a href="/delete_event/{{ event.event_id }}" class="btn btn-danger btn-sm">
                    Delete
                </a>
            </td>
        </tr>
        {% endfor %}

    </table>

</body>
</html>
