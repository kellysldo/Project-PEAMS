<!DOCTYPE html>
<html>

<head>
    <title>Add Event</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h1>Add Event</h1>

    <form method="POST">

        <div class="mb-3">
            <label>Event Name</label>
            <input type="text"
                   name="event_name"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Event Date</label>
            <input type="date"
                   name="event_date"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Location</label>
            <input type="text"
                   name="location"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Description</label>
            <textarea name="description"
                      class="form-control"></textarea>
        </div>

        <button type="submit"
                class="btn btn-success">
            Save Event
        </button>

        <a href="/events" class="btn btn-secondary">
            Back
        </a>

    </form>

</body>
</html>
