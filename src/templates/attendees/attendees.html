<!DOCTYPE html>
<html>

<head>
    <title>Attendees</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h1 class="mb-4">Attendees List</h1>

    <a href="/add_attendee" class="btn btn-primary mb-3">
        Add Attendee
    </a>

    <table class="table table-bordered table-striped">

        <tr>
            <th>ID</th>
            <th>Full Name</th>
            <th>Email</th>
            <th>Contact No</th>
            <th>Address</th>
            <th>Actions</th>
        </tr>

        {% for attendee in attendees %}

        <tr>
            <td>{{ attendee.attendee_id }}</td>
            <td>{{ attendee.fullname }}</td>
            <td>{{ attendee.email }}</td>
            <td>{{ attendee.contact_no }}</td>
            <td>{{ attendee.address }}</td>

            <td>

                <a href="/edit_attendee/{{ attendee.attendee_id }}"
                   class="btn btn-warning btn-sm">
                    Edit
                </a>

                <a href="/delete_attendee/{{ attendee.attendee_id }}"
                   class="btn btn-danger btn-sm">
                    Delete
                </a>

            </td>
        </tr>

        {% endfor %}

    </table>

</body>
</html>
