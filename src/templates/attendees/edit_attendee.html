<!DOCTYPE html>
<html>

<head>
    <title>Edit Attendee</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h1>Edit Attendee</h1>

    <form method="POST">

        <div class="mb-3">
            <label>Full Name</label>

            <input type="text"
                   name="fullname"
                   value="{{ attendee.fullname }}"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Email</label>

            <input type="email"
                   name="email"
                   value="{{ attendee.email }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Contact No</label>

            <input type="text"
                   name="contact_no"
                   value="{{ attendee.contact_no }}"
                   class="form-control">
        </div>

        <div class="mb-3">
            <label>Address</label>

            <input type="text"
                   name="address"
                   value="{{ attendee.address }}"
                   class="form-control">
        </div>

        <button type="submit"
                class="btn btn-success">
            Update Attendee
        </button>

        <a href="/attendees"
           class="btn btn-secondary">
            Back
        </a>

    </form>

</body>
</html>
