<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container">

        <div class="row justify-content-center align-items-center vh-100">

            <div class="col-md-5">

                <div class="card shadow border-0">

                    <div class="card-body p-5">

                        <h2 class="text-center mb-4">
                            Login
                        </h2>

                        <!-- FLASH MESSAGES -->
                        {% with messages = get_flashed_messages() %}
                            {% if messages %}

                                {% for message in messages %}

                                    <div class="alert alert-warning">
                                        {{ message }}
                                    </div>

                                {% endfor %}

                            {% endif %}
                        {% endwith %}

                        <form method="POST">

                            <div class="mb-3">

                                <label class="form-label">
                                    Username
                                </label>

                                <input type="text"
                                       name="username"
                                       class="form-control"
                                       placeholder="Enter username"
                                       required>

                            </div>

                            <div class="mb-4">

                                <label class="form-label">
                                    Password
                                </label>

                                <input type="password"
                                       name="password"
                                       class="form-control"
                                       placeholder="Enter password"
                                       required>

                            </div>

                            <button type="submit"
                                    class="btn btn-dark w-100">

                                Login

                            </button>

                        </form>

                        <hr>

                        <p class="text-center">

                            No account?

                            <a href="/register">
                                Register here
                            </a>

                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
