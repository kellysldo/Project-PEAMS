<!DOCTYPE html>
<html>

<head>

    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

    <div class="container">

        <div class="row justify-content-center align-items-center vh-100">

            <div class="col-md-5">

                <div class="card shadow border-0">

                    <div class="card-body p-5">

                        <h2 class="text-center mb-4">
                            Create Account
                        </h2>

                        <form method="POST">

                            <div class="mb-3">

                                <label class="form-label">
                                    Full Name
                                </label>

                                <input type="text"
                                       name="full_name"
                                       class="form-control"
                                       placeholder="Enter full name"
                                       required>

                            </div>

                            <div class="mb-3">

                                <label class="form-label">
                                    Email
                                </label>

                                <input type="email"
                                       name="email"
                                       class="form-control"
                                       placeholder="Enter email"
                                       required>

                            </div>

                            <div class="mb-3">
                                <label>Username</label>

                                <input type="text"
                                    name="username"
                                    class="form-control"
                                    maxlength="20"
                                    required>

                                <div class="text-danger mt-1">
                                    Username must not exceed 20 characters.
                                </div>
                            </div>

                            <div class="mb-4">
                                <label>Password</label>

                                <input type="password"
                                    name="password"
                                    class="form-control"
                                    maxlength="16"
                                    required>

                                <div class="text-danger mt-1">
                                    Password must not exceed 20 characters.
                                </div>
                            </div>

                            <button type="submit"
                                    class="btn btn-dark w-100">

                                Register

                            </button>

                        </form>
                        
                        {% with messages = get_flashed_messages() %}
                            {% if messages %}
                                {% for message in messages %}
                                    <div class="alert alert-danger">
                                        {{ message }}
                                    </div>
                                {% endfor %}
                            {% endif %}
                        {% endwith %}

                        <hr>

                        <p class="text-center">

                            Already have an account?

                            <a href="/login">
                                Login here
                            </a>

                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
