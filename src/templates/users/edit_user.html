<!DOCTYPE html>
<html>

<head>
    <title>Edit User</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="container mt-5">

    <h1 class="mb-4">Edit User</h1>

    <form method="POST">

        <div class="mb-3">

            <label class="form-label">
                Full Name
            </label>

            <input type="text"
                   name="full_name"
                   value="{{ user.full_name }}"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Email
            </label>

            <input type="email"
                   name="email"
                   value="{{ user.email }}"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Password
            </label>

            <input type="text"
                   name="password"
                   value="{{ user.password }}"
                   class="form-control"
                   required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Role
            </label>

            <select name="role"
                    class="form-select">

                <option value="staff"
                    {% if user.role == 'staff' %}
                        selected
                    {% endif %}>
                    Staff
                </option>

                <option value="admin"
                    {% if user.role == 'admin' %}
                        selected
                    {% endif %}>
                    Admin
                </option>

            </select>

        </div>

        <button type="submit"
                class="btn btn-success">
            Update User
        </button>

        <a href="/users"
           class="btn btn-secondary">
            Back
        </a>

    </form>

</body>
</html>
