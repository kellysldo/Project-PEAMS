<!DOCTYPE html>
<html>

<head>
    <title>Edit Event</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h1>Edit Event</h1>

    <form method="POST">

        <div class="mb-3">
            <label>Full Name</label>
            <input type="text"
                   name="fullname"
                   value="{{ attendees.fullname }}"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Emaile</label>
            <input type="date"
                   name="event_date"
                   value="{{ attendees.email }}"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Address</label>
            <input type="text"
                   name="address"
                   value="{{ attendees.address }}"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Contact Number</label>
            <input type="int"
                   name="contact_no"
                   value="{{ attendees.contact_no }}"
                   class="form-control"
                   required>
        </div>


        <button type="submit"
                class="btn btn-success">
            Update Event
        </button>

        <a href="/events" class="btn btn-secondary">
            Back
        </a>

    </form>

</body>
</html>
