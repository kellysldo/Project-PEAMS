<!DOCTYPE html>
<html>

<head>
    <title>Add Event</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h1>Add Event</h1>

    <form method="POST">

        <div class="mb-3">
            <label>Name</label>
            <input type="text"
                   name="fullname"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="text"
                   name="email"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Address</label>
            <input type="text"
                   name="address"
                   class="form-control"
                   required>
        </div>

        <div class="mb-3">
            <label>Contact Number</label>
            <input type="int"
                   name="contact_no"
                   class="form-control"
                   required>
        </div>

        <button type="submit"
                class="btn btn-success">
            Save Event
        </button>

        <a href="/events" class="btn btn-secondary">
            Back
        </a>

    </form>

</body>
</html>
