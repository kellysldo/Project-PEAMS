<!DOCTYPE html>
<html>
<head>
    <title>Registrations Management</title>
    <style>
        body { font-family: Arial; margin: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        table, th, td { border: 1px solid #ccc; }
        th, td { padding: 10px; text-align: center; }

        .form-box {
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ddd;
        }

        select, button {
            padding: 8px;
            margin: 5px;
        }
    </style>
</head>

<body>

<h2>🎟 Event Registrations</h2>

<!-- CREATE REGISTRATION -->
<div class="form-box">
    <h3>Register Attendee to Event</h3>

    <form method="POST" action="/add_registration">

        <!-- Attendee dropdown -->
        <select name="attendee_id" required>
            <option value="">Select Attendee</option>
            {% for a in attendees %}
                <option value="{{ a.id }}">{{ a.name }}</option>
            {% endfor %}
        </select>

        <!-- Event dropdown -->
        <select name="event_id" required>
            <option value="">Select Event</option>
            {% for e in events %}
                <option value="{{ e.id }}">{{ e.title }}</option>
            {% endfor %}
        </select>

        <button type="submit">Register</button>
    </form>
</div>

<!-- READ REGISTRATIONS -->
<table>
    <tr>
        <th>ID</th>
        <th>Attendee</th>
        <th>Event</th>
        <th>Status</th>
        <th>Actions</th>
    </tr>

    {% for r in registrations %}
    <tr>
        <td>{{ r.id }}</td>
        <td>{{ r.attendee_name }}</td>
        <td>{{ r.event_title }}</td>
        <td>{{ r.status }}</td>
        <td>

            <!-- UPDATE STATUS -->
            <form method="POST" action="/update_registration" style="display:inline;">
                <input type="hidden" name="id" value="{{ r.id }}">

                <select name="status">
                    <option value="Registered">Registered</option>
                    <option value="Attended">Attended</option>
                    <option value="Cancelled">Cancelled</option>
                </select>

                <button type="submit">Update</button>
            </form>

            <!-- DELETE -->
            <form method="POST" action="/delete_registration" style="display:inline;">
                <input type="hidden" name="id" value="{{ r.id }}">
                <button type="submit">Delete</button>
            </form>

        </td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
